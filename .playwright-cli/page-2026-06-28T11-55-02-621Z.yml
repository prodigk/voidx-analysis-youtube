                  - listitem [ref=e997]: 최근 영상은 장편 낭독·해설형 콘텐츠와 1분 내외 쇼츠가 함께 운영되고 있습니다.
                  - listitem [ref=e998]: 장편 영상 길이는 40:59, 1:00:39, 46:48, 42:58, 2:27:39 등으로, 취침 전·이동 중·가사 중 청취에 적합한 오디오 중심 포맷입니다.
                  - listitem [ref=e999]: "쇼츠는 0:46~1:00 길이이며, 장편 영상의 핵심 정서나 문장을 압축한 형태로 보입니다. 예: ‘다 쓰고 죽는게 가장 현명한 방법’, ‘당신의 영혼을 따뜻하게 데워줄…’, ‘삶은 결국 내 편이다’."
