                  - listitem [ref=e1022]: 최근 영상 중 2시간 27분 길이의 ‘불면의 밤을 위한 어른 책 모음집’이 높은 최근 조회수를 기록한 점은 긴 호흡의 수면 친화형 콘텐츠 수요를 시사합니다.
