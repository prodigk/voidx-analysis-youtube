            - paragraph [ref=e985]: 입력 데이터 기준, ‘책읽는 자작나무’는 46.5만 구독자, 누적 조회수 8,519만 회, 영상 469개를 보유한 대형 책·인문 오디오형 채널입니다. 최근 영상은 40분~2시간 27분의 장편 낭독·해설형 콘텐츠와 1분 내외 쇼츠를 병행하고 있으며, 인기 영상은 ‘삶의 의미’, ‘불안’, ‘긍정의 말’, ‘홀가분한 삶’, ‘오십 이후의 성장’, ‘홀로서기’처럼 중장년층의 정서적 안정과 삶의 태도 전환에 맞닿아 있습니다. ‘잠들기전 교양이’는 이 채널의 장점인 차분한 정서, 장편 체류형 포맷, 삶의 위로 키워드를 참고하되, 철학·문화·심리·커리어·IT를 엮는 차별화된 교양 큐레이션으로 포지셔닝하는 것이 적절합니다.
            - generic [ref=e986]:
              - generic [ref=e987]:
                - 'heading "1. 관찰: 채널 규모와 기본 체력" [level=4] [ref=e988]'
                - list [ref=e989]:
                  - listitem [ref=e990]: 구독자 465,000명, 총 조회수 85,192,369회, 영상 수 469개로 입력 데이터상 이미 안정적인 대형 채널입니다.
                  - listitem [ref=e991]: 영상 1개당 단순 평균 누적 조회수는 약 18만 회 수준입니다. 단, 이는 전체 누적 조회수와 전체 영상 수의 단순 계산이며, 실제 영상별 성과 분포와는 다를 수 있습니다.
                  - listitem [ref=e992]: 최근 평균 조회수는 37,594회로 제공되어 있습니다. 최근 8개 영상 중 장편 영상은 27,839회~83,296회, 쇼츠는 5,712회~10,973회 범위입니다.
                  - listitem [ref=e993]: 최근 장편 영상 중 ‘나잇값 말고, 마음값 | 불면의 밤을 위한 어른 책 모음집’은 83,296회로 최근 목록 내 최고 성과입니다. 제목에 ‘불면의 밤’, ‘어른’, ‘책 모음집’이 포함되어 수면 전 청취 맥락과 잘 맞습니다.
